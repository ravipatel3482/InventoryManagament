# Get the full list of product
query GetAllInventory {
  allProducts {
    id
    name
    distributor
  }
}   
query GetAllInventory {
  allProducts {
    id
    name
    distributor
    department {
      id
      name
      categories {
        id
        subCategories {
          id
          name
        }
        name
      }
    }
  }
}
# GetInventoryHealth
query GetInventoryHealth {
  allProducts {
    name
    stocks
    purchase_cost
    selling_cost
    markup   # Calculated automatically: e.g. "25.00%"
    margin   # Calculated automatically: e.g. "20.00%"
  }
}
# Get allDiscontinuedProducts
query GetArchiveList {
  allDiscontinuedProducts {
    id
    name
    company
    distributor
    stocks
    isDiscontinued
  }
}
